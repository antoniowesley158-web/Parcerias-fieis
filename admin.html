<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Admin WSX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c0f14;
  color:#fff;
  padding:15px;
}

h2,h3{
  margin-top:10px;
}

input,textarea,select{
  width:100%;
  padding:10px;
  margin-bottom:8px;
  border:none;
  border-radius:6px;
  background:#141a24;
  color:#fff;
}

button{
  width:100%;
  padding:12px;
  background:#d4af37;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

.card{
  background:#141a24;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>⚙️ Painel Admin</h2>

<h3>Editar Empresa</h3>

<input id="nome" placeholder="Nome do site">
<textarea id="desc" placeholder="Descrição"></textarea>
<input id="banner" placeholder="URL da imagem do banner">

<hr>

<h3>Adicionar Parceiro</h3>

<input id="pNome" placeholder="Nome">
<input id="pZap" placeholder="WhatsApp (DDD + número)">
<input id="pInsta" placeholder="Instagram link">
<input id="pImg" placeholder="URL da imagem">

<select id="tipo">
  <option value="premium">Premium</option>
  <option value="vip">VIP</option>
</select>

<button onclick="salvar()">Salvar tudo</button>

<script>
function salvar(){

  let data = JSON.parse(localStorage.getItem("site")) || {
    premium:[],
    vip:[]
  };

  data.nome = nome.value;
  data.desc = desc.value;
  data.banner = banner.value;

  let p = {
    nome:pNome.value,
    zap:pZap.value,
    insta:pInsta.value,
    img:pImg.value
  };

  if(tipo.value === "premium"){
    data.premium.push(p);
  } else {
    data.vip.push(p);
  }

  localStorage.setItem("site", JSON.stringify(data));

  alert("Salvo com sucesso!");
}
</script>

</body>
</html>
