<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSX Parcerias</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0a0a0a;
  color:#fff;
}

/* BANNER */
.banner {
  height:220px;
  background:url('https://via.placeholder.com/1200x300') center/cover;
  position:relative;
}

.banner::after {
  content:'';
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
}

.banner-content {
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.banner-content h1 {
  margin:0;
  font-size:28px;
  color:#00ffcc;
}

.banner-content p {
  margin-top:5px;
  color:#ccc;
}

/* CONTAINER */
.container {
  padding:20px;
}

/* SEÇÕES */
.section {
  margin-bottom:40px;
}

.section h2 {
  border-left:5px solid #00ffcc;
  padding-left:10px;
}

/* CARD */
.card {
  display:flex;
  align-items:center;
  background:#151515;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  transition:0.3s;
}

.card:hover {
  transform:scale(1.02);
  box-shadow:0 0 15px rgba(0,255,204,0.3);
}

/* LOGO */
.logo {
  width:60px;
  height:60px;
  border-radius:10px;
  background:#222;
  margin-right:15px;
  background-size:cover;
  background-position:center;
}

/* INFO */
.info h3 {
  margin:0;
}

.info p {
  margin:5px 0;
  color:#aaa;
}

/* BOTÕES */
.buttons {
  margin-top:5px;
}

.btn {
  padding:6px 12px;
  border-radius:6px;
  text-decoration:none;
  font-size:14px;
  margin-right:5px;
}

.site {
  background:#00ffcc;
  color:#000;
}

.insta {
  background:#e1306c;
  color:#fff;
}

/* PREMIUM */
.premium {
  border:1px solid gold;
  position:relative;
}

.premium::before {
  content:'⭐ PREMIUM';
  position:absolute;
  top:-10px;
  right:10px;
  background:gold;
  color:#000;
  font-size:10px;
  padding:3px 6px;
  border-radius:5px;
}

/* FOOTER */
footer {
  text-align:center;
  padding:15px;
  background:#111;
  color:#777;
}
</style>
</head>

<body>

<div class="banner">
  <div class="banner-content">
    <h1>WSX Parcerias</h1>
    <p>Conectando negócios e oportunidades</p>
  </div>
</div>

<div class="container">

<!-- FIÉIS -->
<div class="section">
  <h2>🔹 Parcerias Fiéis</h2>

  <div class="card">
    <div class="logo" style="background-image:url('https://via.placeholder.com/60')"></div>
    <div class="info">
      <h3>Nome do Parceiro</h3>
      <p>Descrição do parceiro</p>
      <div class="buttons">
        <a href="#" class="btn site">Site</a>
        <a href="#" class="btn insta">Instagram</a>
      </div>
    </div>
  </div>

</div>

<!-- PREMIUM -->
<div class="section">
  <h2>⭐ Parceiros Premium</h2>

  <div class="card premium">
    <div class="logo" style="background-image:url('https://via.placeholder.com/60')"></div>
    <div class="info">
      <h3>Parceiro Top</h3>
      <p>Parceria de destaque</p>
      <div class="buttons">
        <a href="#" class="btn site">Site</a>
        <a href="#" class="btn insta">Instagram</a>
      </div>
    </div>
  </div>

</div>

</div>

<footer>
© 2026 WSX - Todos os direitos reservados
</footer>

</body>
</html>
