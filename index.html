<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSX Parcerias</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f5f5;
  color:#222;
}

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background:#fff;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.menu {
  font-size:24px;
  cursor:pointer;
}

/* BANNER */
.banner {
  height:180px;
  background:#ccc center/cover;
}

/* INFO */
.info {
  text-align:center;
  padding:20px;
}

.info h1 {
  margin:0;
}

.info p {
  color:#666;
}

/* SEÇÕES */
.container {
  padding:20px;
}

.section {
  margin-bottom:30px;
}

.section h2 {
  margin-bottom:10px;
}

/* CARD */
.card {
  display:flex;
  align-items:center;
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.08);
}

.logo {
  width:50px;
  height:50px;
  border-radius:8px;
  background:#ddd;
  margin-right:15px;
  background-size:cover;
}

.card h3 {
  margin:0;
}

.card p {
  margin:5px 0;
  color:#666;
}

.buttons a {
  margin-right:5px;
  text-decoration:none;
  font-size:13px;
  padding:5px 10px;
  border-radius:5px;
}

.site {
  background:#222;
  color:#fff;
}

.insta {
  background:#e1306c;
  color:#fff;
}

/* MENU ADM */
.panel {
  position:fixed;
  top:0;
  right:-100%;
  width:250px;
  height:100%;
  background:#fff;
  box-shadow:-2px 0 5px rgba(0,0,0,0.2);
  padding:15px;
  transition:0.3s;
}

.panel.active {
  right:0;
}

input, textarea {
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

button {
  width:100%;
  padding:10px;
  background:#222;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div class="menu" onclick="toggleMenu()">☰</div>
  <strong id="titulo">WSX Parcerias</strong>
</header>

<div class="banner" id="banner"></div>

<div class="info">
  <h1 id="nome">Minha Empresa</h1>
  <p id="desc">Descrição da empresa aqui</p>
</div>

<div class="container">

<!-- PREMIUM -->
<div class="section">
  <h2>⭐ Parceiros Premium</h2>
  <div id="premium"></div>
</div>

<!-- VIP -->
<div class="section">
  <h2>💎 Parceiros VIP</h2>
  <div id="vip"></div>
</div>

</div>

<!-- MENU ADM -->
<div class="panel" id="panel">
  <h3>Editar Site</h3>
  <input id="novoNome" placeholder="Nome da empresa">
  <input id="novoBanner" placeholder="URL do banner">
  <textarea id="novaDesc" placeholder="Descrição"></textarea>
  <button onclick="salvar()">Salvar</button>
</div>

<script>
function toggleMenu(){
  document.getElementById("panel").classList.toggle("active");
}

// DADOS (pode colocar +50 aqui tranquilo)
const premiumData = [
  {nome:"Parceiro 1", desc:"Top parceiro", img:"", site:"#", insta:"#"}
];

const vipData = [
  {nome:"Parceiro VIP", desc:"Parceiro fiel", img:"", site:"#", insta:"#"}
];

// RENDER
function render(){
  const premium = document.getElementById("premium");
  const vip = document.getElementById("vip");

  premium.innerHTML = "";
  vip.innerHTML = "";

  premiumData.forEach(p => {
    premium.innerHTML += card(p);
  });

  vipData.forEach(p => {
    vip.innerHTML += card(p);
  });
}

function card(p){
  return `
  <div class="card">
    <div class="logo" style="background-image:url('${p.img}')"></div>
    <div>
      <h3>${p.nome}</h3>
      <p>${p.desc}</p>
      <div class="buttons">
        <a href="${p.site}" class="site">Site</a>
        <a href="${p.insta}" class="insta">Instagram</a>
      </div>
    </div>
  </div>`;
}

// SALVAR LOCAL
function salvar(){
  localStorage.setItem("nome", document.getElementById("novoNome").value);
  localStorage.setItem("desc", document.getElementById("novaDesc").value);
  localStorage.setItem("banner", document.getElementById("novoBanner").value);
  carregar();
}

// CARREGAR
function carregar(){
  document.getElementById("nome").innerText = localStorage.getItem("nome") || "Minha Empresa";
  document.getElementById("desc").innerText = localStorage.getItem("desc") || "";
  document.getElementById("banner").style.backgroundImage =
    `url(${localStorage.getItem("banner") || ""})`;
}

render();
carregar();
</script>

</body>
</html>
