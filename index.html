<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSX Parcerias</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
  color:#222;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#fff;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* BANNER */
.banner{
  height:180px;
  background:#ccc center/cover;
}

/* INFO */
.info{
  text-align:center;
  padding:15px;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* CARD */
.card{
  display:flex;
  background:#fff;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.logo{
  width:50px;
  height:50px;
  border-radius:8px;
  background:#ddd;
  margin-right:10px;
  background-size:cover;
}

/* BOTÕES */
.btn{
  padding:5px 10px;
  border-radius:5px;
  text-decoration:none;
  font-size:12px;
}

.zap{background:#25D366;color:#000}
.insta{background:#e1306c;color:#fff}

/* PREMIUM */
.premium{
  border-left:4px solid gold;
}

/* MENU ADM */
.panel{
  position:fixed;
  right:-100%;
  top:0;
  width:260px;
  height:100%;
  background:#fff;
  padding:15px;
  transition:.3s;
  box-shadow:-2px 0 8px rgba(0,0,0,0.2);
}

.panel.active{right:0}

input,textarea{
  width:100%;
  padding:8px;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:10px;
  background:#111;
  color:#fff;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div onclick="toggle()">☰</div>
  <div id="title">WSX Parcerias</div>
  <div>Empresa</div>
</header>

<div class="banner" id="banner"></div>

<div class="info">
  <h2 id="name">Minha Empresa</h2>
  <p id="desc">Descrição da empresa aqui</p>
</div>

<div class="container">

<h3>⭐ Premium</h3>

<div class="card premium">
  <div class="logo"></div>
  <div>
    <strong>Parceiro Premium</strong>
    <p>Descrição aqui</p>
    <a class="btn zap" href="#">WhatsApp</a>
    <a class="btn insta" href="#">Instagram</a>
  </div>
</div>

<h3>💎 VIP</h3>

<div class="card">
  <div class="logo"></div>
  <div>
    <strong>Parceiro VIP</strong>
    <p>Descrição aqui</p>
    <a class="btn zap" href="#">WhatsApp</a>
    <a class="btn insta" href="#">Instagram</a>
  </div>
</div>

</div>

<!-- ADM -->
<div class="panel" id="panel">
  <h3>Editar site</h3>

  <input id="nName" placeholder="Nome do site">
  <input id="nBanner" placeholder="URL do banner">
  <textarea id="nDesc" placeholder="Descrição"></textarea>

  <button onclick="save()">Salvar</button>
</div>

<script>
function toggle(){
  document.getElementById("panel").classList.toggle("active");
}

function save(){
  document.getElementById("name").innerText = nName.value;
  document.getElementById("desc").innerText = nDesc.value;
  document.getElementById("banner").style.backgroundImage =
    `url(${nBanner.value})`;
}
</script>

</body>
</html>
