<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSX Parcerias</title>

<!-- Firebase (modo compat pra não quebrar) -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1115;
  color:#fff;
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:15px;
  background:#111;
}

/* BANNER */
.banner{
  height:180px;
  background:#222 center/cover;
}

/* TEXTO */
.info{
  text-align:center;
  padding:15px;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* CARD */
.card{
  display:flex;
  background:#15181f;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
  box-shadow:0 0 10px rgba(0,255,200,0.08);
}

.logo{
  width:50px;
  height:50px;
  border-radius:8px;
  background:#333;
  margin-right:10px;
  background-size:cover;
}

/* BOTÕES */
.btn{
  padding:5px 10px;
  border-radius:5px;
  text-decoration:none;
  font-size:12px;
}

.zap{background:#25D366;color:#000}
.insta{background:#e1306c;color:#fff}

/* PREMIUM destaque */
.premium{
  border:1px solid gold;
}

/* MENU ADM */
.panel{
  position:fixed;
  right:-100%;
  top:0;
  width:260px;
  height:100%;
  background:#111;
  padding:15px;
  transition:.3s;
}

.panel.active{right:0}

input,textarea{
  width:100%;
  padding:8px;
  margin-bottom:8px;
  background:#222;
  border:none;
  color:#fff;
}

button{
  width:100%;
  padding:10px;
  background:#00ffc8;
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <div onclick="toggle()">☰</div>
  <div id="title">WSX Parcerias</div>
  <div onclick="login()">Login</div>
</header>

<div class="banner" id="banner"></div>

<div class="info">
  <h2 id="name">Minha Empresa</h2>
  <p id="desc">Descrição aqui</p>
</div>

<div class="container">
  <h3>⭐ Premium</h3>
  <div id="premium"></div>

  <h3>💎 VIP</h3>
  <div id="vip"></div>
</div>

<!-- ADM -->
<div class="panel" id="panel">
  <h3>Editar site</h3>
  <input id="nName" placeholder="Nome">
  <input id="nBanner" placeholder="URL banner">
  <textarea id="nDesc" placeholder="Descrição"></textarea>
  <button onclick="save()">Salvar</button>
</div>

<script>
// 🔥 SEU FIREBASE CONFIG (já colocado)
const firebaseConfig = {
  apiKey: "AIzaSyCu2jOoDfKhDI0Jy6g4FbOsXs-_SkruLnE",
  authDomain: "parcerias-a4318.firebaseapp.com",
  projectId: "parcerias-a4318",
  storageBucket: "parcerias-a4318.firebasestorage.app",
  messagingSenderId: "991041310408",
  appId: "1:991041310408:web:437c3d83562d81405e1ffd"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* LOGIN GOOGLE */
function login(){
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

/* LOGIN STATUS */
auth.onAuthStateChanged(user=>{
  if(user){
    console.log("logado");
  }
  load();
});

/* MENU */
function toggle(){
  document.getElementById("panel").classList.toggle("active");
}

/* CARD */
function card(p, premium=false){
  return `
  <div class="card ${premium?'premium':''}">
    <div class="logo" style="background-image:url('${p.img}')"></div>
    <div>
      <strong>${p.nome}</strong>
      <p>${p.desc}</p>
      <a class="btn zap" href="https://wa.me/${p.zap}">WhatsApp</a>
      <a class="btn insta" href="${p.insta}">Instagram</a>
    </div>
  </div>`;
}

/* SALVAR SITE */
function save(){
  db.collection("site").doc("config").set({
    name:nName.value,
    desc:nDesc.value,
    banner:nBanner.value
  });
}

/* CARREGAR */
function load(){
  db.collection("site").doc("config").get().then(doc=>{
    if(doc.exists){
      let d = doc.data();
      name.innerText = d.name;
      desc.innerText = d.desc;
      banner.style.backgroundImage = `url(${d.banner})`;
    }
  });
}
</script>

</body>
</html>
