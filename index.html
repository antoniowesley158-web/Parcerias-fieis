<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSX Parcerias</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0c0f14;
  color:#eaeaea;
}

.banner{
  height:180px;
  background:#1b2230 center/cover;
}

.info{
  text-align:center;
  padding:18px;
}

.info h2{
  margin:0;
  font-size:22px;
}

.info p{
  margin:5px 0 0;
  color:#9aa4b2;
}

.container{
  padding:15px;
}

h3{
  font-size:14px;
  color:#7d8aa3;
  margin:20px 0 10px;
  letter-spacing:1px;
}

.card{
  display:flex;
  align-items:center;
  background:#141a24;
  border:1px solid #202838;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.logo{
  width:48px;
  height:48px;
  border-radius:8px;
  margin-right:12px;
  background-size:cover;
  background-position:center;
}

.card strong{
  font-size:15px;
}

.card p{
  margin:3px 0 6px;
  font-size:12px;
  color:#9aa4b2;
}

.btn{
  font-size:11px;
  padding:5px 9px;
  border-radius:6px;
  text-decoration:none;
  margin-right:5px;
}

.zap{background:#1f8f4a;color:#fff}
.insta{background:#c13584;color:#fff}

.premium{
  border-left:3px solid #d4af37;
}
</style>
</head>

<body>

<div class="banner" id="banner"></div>

<div class="info">
  <h2 id="nome">Empresa</h2>
  <p id="desc">Descrição</p>
</div>

<div class="container">
  <h3>⭐ Premium</h3>
  <div id="premium"></div>

  <h3>💎 VIP</h3>
  <div id="vip"></div>
</div>

<script>
function load(){
  let data = JSON.parse(localStorage.getItem("site")) || {
    nome:"Empresa",
    desc:"",
    banner:"",
    premium:[],
    vip:[]
  };

  nome.innerText = data.nome;
  desc.innerText = data.desc;
  banner.style.backgroundImage = `url(${data.banner})`;

  premium.innerHTML = "";
  vip.innerHTML = "";

  data.premium.forEach(p=>{
    premium.innerHTML += card(p,true);
  });

  data.vip.forEach(p=>{
    vip.innerHTML += card(p,false);
  });
}

function card(p, prem){
  return `
  <div class="card ${prem?'premium':''}">
    <div class="logo" style="background-image:url('${p.img}')"></div>
    <div>
      <strong>${p.nome}</strong>
      <p>${p.desc || ""}</p>
      <a class="btn zap" href="https://wa.me/${p.zap}">WhatsApp</a>
      <a class="btn insta" href="${p.insta}">Instagram</a>
    </div>
  </div>`;
}

load();
</script>

</body>
</html>
