<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WSX Parcerias</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(180deg,#0b0f14,#0f1115);
  color:#fff;
}

/* BANNER */
.banner{
  height:220px;
  background:#1a1f2b center/cover;
  position:relative;
}

/* INFO */
.info{
  text-align:center;
  padding:20px;
}

/* CONTAINER */
.container{
  padding:15px;
}

/* TITULOS */
h3{
  margin:20px 0 10px;
  color:#aaa;
  font-weight:normal;
}

/* CARD GLASS */
.card{
  display:flex;
  align-items:center;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,0.08);
  padding:12px;
  border-radius:14px;
  margin-bottom:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.4);
  animation:fade 0.4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

/* LOGO */
.logo{
  width:55px;
  height:55px;
  border-radius:12px;
  margin-right:12px;
  background:#222;
  background-size:cover;
}

/* TEXTOS */
.card strong{
  font-size:15px;
}

.card p{
  margin:3px 0 0;
  font-size:13px;
  color:#aaa;
}

/* BOTÕES */
.btn{
  display:inline-block;
  margin-top:5px;
  padding:5px 10px;
  border-radius:8px;
  font-size:12px;
  text-decoration:none;
}

.zap{background:#25D366;color:#000}
.insta{background:#e1306c;color:#fff}

/* PREMIUM destaque */
.premium{
  border:1px solid rgba(255,215,0,0.4);
  box-shadow:0 0 15px rgba(255,215,0,0.1);
}
</style>
</head>

<body>

<div class="banner" id="banner"></div>

<div class="info">
  <h2 id="nome">Empresa</h2>
  <p id="desc">Descrição da empresa</p>
</div>

<div class="container">

<h3>⭐ Premium</h3>
<div id="premium"></div>

<h3>💎 VIP</h3>
<div id="vip"></div>

</div>

<script>
function load(){
  let data = JSON.parse(localStorage.getItem("site")) || {
    nome:"Empresa",
    desc:"",
    banner:"",
    premium:[],
    vip:[]
  };

  nome.innerText = data.nome;
  desc.innerText = data.desc;
  banner.style.backgroundImage = `url(${data.banner})`;

  premium.innerHTML = "";
  vip.innerHTML = "";

  data.premium.forEach(p=>{
    premium.innerHTML += card(p,true);
  });

  data.vip.forEach(p=>{
    vip.innerHTML += card(p,false);
  });
}

function card(p, prem){
  return `
  <div class="card ${prem?'premium':''}">
    <div class="logo" style="background-image:url('${p.img}')"></div>
    <div>
      <strong>${p.nome}</strong>
      <p>${p.desc || ""}</p>
      <a class="btn zap" href="https://wa.me/${p.zap}">WhatsApp</a>
      <a class="btn insta" href="${p.insta}">Instagram</a>
    </div>
  </div>`;
}

load();
</script>

</body>
</html>
