<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parcerias WSX</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f1115;
  color:#fff;
}

.banner{
  height:200px;
  background:#222 center/cover;
  transition:0.5s;
}

.info{
  text-align:center;
  padding:15px;
}

.container{
  padding:15px;
}

.card{
  display:flex;
  background:#15181f;
  padding:12px;
  border-radius:12px;
  margin-bottom:10px;
  animation:fade 0.4s ease;
  box-shadow:0 0 10px rgba(0,255,200,0.08);
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px);}
  to{opacity:1;transform:translateY(0);}
}

.logo{
  width:55px;
  height:55px;
  border-radius:10px;
  background:#333;
  margin-right:10px;
  background-size:cover;
}

.btn{
  padding:5px 10px;
  border-radius:5px;
  text-decoration:none;
  font-size:12px;
}

.zap{background:#25D366;color:#000}
.insta{background:#e1306c;color:#fff}

.premium{
  border-left:4px solid gold;
}
</style>
</head>

<body>

<div class="banner" id="banner"></div>

<div class="info">
  <h2 id="nome">Empresa</h2>
  <p id="desc">Descrição</p>
</div>

<div class="container">
  <h3>⭐ Premium</h3>
  <div id="premium"></div>

  <h3>💎 VIP</h3>
  <div id="vip"></div>
</div>

<script>
function load(){
  let data = JSON.parse(localStorage.getItem("site")) || {
    nome:"Empresa",
    desc:"Descrição",
    banner:"",
    premium:[],
    vip:[]
  };

  nome.innerText = data.nome;
  desc.innerText = data.desc;
  banner.style.backgroundImage = `url(${data.banner})`;

  premium.innerHTML = "";
  vip.innerHTML = "";

  data.premium.forEach(p=>{
    premium.innerHTML += card(p,true);
  });

  data.vip.forEach(p=>{
    vip.innerHTML += card(p,false);
  });
}

function card(p, prem){
  return `
  <div class="card ${prem?'premium':''}">
    <div class="logo" style="background-image:url('${p.img}')"></div>
    <div>
      <strong>${p.nome}</strong><br>
      <a class="btn zap" href="https://wa.me/${p.zap}">WhatsApp</a>
      <a class="btn insta" href="${p.insta}">Instagram</a>
    </div>
  </div>`;
}

load();
</script>

</body>
</html>
